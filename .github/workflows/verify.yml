name: Verify

"on":
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: Run local verification
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Run source-of-truth verification
        run: ./scripts/verify.sh
