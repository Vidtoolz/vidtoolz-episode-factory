<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VIDTOOLZ Package Runs Dashboard</title>
    <link rel="stylesheet" href="styles.css?v=1.5.0" />
  </head>
  <body>
    <div class="app-shell package-engine-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">VIDTOOLZ</p>
          <h1>Package Runs <span class="version-badge">v1.5.0</span></h1>
        </div>
        <div class="topbar-actions">
          <a class="nav-link-button" href="index.html">Episode Factory</a>
          <a class="nav-link-button" href="package-engine.html">Package Engine</a>
        </div>
      </header>

      <p id="packageRunsStatus" class="global-status" role="status"></p>

      <main class="package-runs-dashboard">
        <section class="package-controls" aria-label="Package run filters">
          <div>
            <h2>Run Status</h2>
            <p class="muted">Regenerate the index with <code>node scripts/package-runs-index.js</code>.</p>
          </div>
          <label>
            <span>Workflow</span>
            <select id="runStatusFilter">
              <option value="All">All</option>
              <option value="Needs package selection">Needs package selection</option>
              <option value="Needs outline">Needs outline</option>
              <option value="Needs script">Needs script</option>
              <option value="Needs production prep">Needs production prep</option>
              <option value="Ready to shoot">Ready to shoot</option>
            </select>
          </label>
          <label>
            <span>Sort</span>
            <select id="runSortSelect">
              <option value="run-desc">Newest run first</option>
              <option value="run-asc">Oldest run first</option>
              <option value="status">Status</option>
            </select>
          </label>
          <div id="packageRunsSummary" class="package-summary">
            <span>0 runs</span>
            <strong>No index loaded</strong>
          </div>
        </section>

        <section id="packageRunsStats" class="package-runs-stats" aria-label="Package run status counts"></section>
        <section id="packageRunsGrid" class="package-runs-grid" aria-label="Package run cards"></section>
      </main>
    </div>

    <script src="package-runs-dashboard.js?v=1.5.0"></script>
  </body>
</html>
