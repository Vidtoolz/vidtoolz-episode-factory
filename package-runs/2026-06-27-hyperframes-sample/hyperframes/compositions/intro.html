<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1080px; height: 1920px; overflow: hidden; background: #0d1117; }
      body { font-family: "Inter", system-ui, sans-serif; color: #e6edf3; }
      #root { width: 1080px; height: 1920px; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 28px; }
      .eyebrow { color: #3fb950; font-size: 34px; letter-spacing: 0.18em; text-transform: uppercase; opacity: 0; }
      .title { font-size: 96px; font-weight: 800; text-align: center; line-height: 1.1; max-width: 900px; opacity: 0; }
      .rule { width: 0; height: 6px; background: #3fb950; border-radius: 3px; }
    </style>
  </head>
  <body>
    <div id="root" data-composition-id="intro" data-start="0" data-duration="3"
      data-width="1080" data-height="1920" data-fps="30">
      <p class="eyebrow">VIDTOOLZ</p>
      <h1 class="title">Show the craft.</h1>
      <div class="rule"></div>
    </div>
    <script>
      // HyperFrames drives time; animate on the GSAP timeline so the render is deterministic.
      const tl = gsap.timeline();
      tl.to(".eyebrow", { opacity: 1, duration: 0.5, ease: "power2.out" })
        .to(".title", { opacity: 1, y: 0, duration: 0.6, ease: "power2.out" }, 0.2)
        .fromTo(".rule", { width: 0 }, { width: 420, duration: 0.6, ease: "power2.inOut" }, 0.5);
      if (window.hyperframes && window.hyperframes.useTimeline) {
        window.hyperframes.useTimeline(tl);
      }
    </script>
  </body>
</html>
