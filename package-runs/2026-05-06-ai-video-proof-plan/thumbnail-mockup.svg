<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">Run 3 thumbnail planning mockup: Where's the proof?</title>
  <desc id="desc">Planning mockup only. Split-screen proof-plan tension: prepared stress-test idea on left, proof-plan checklist under review on right. Not final thumbnail approval.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#080B12"/>
      <stop offset="0.55" stop-color="#101827"/>
      <stop offset="1" stop-color="#182033"/>
    </linearGradient>
    <linearGradient id="leftPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#23283A"/>
      <stop offset="1" stop-color="#141824"/>
    </linearGradient>
    <linearGradient id="rightPanel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#17253B"/>
      <stop offset="1" stop-color="#0E1726"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="softBlur">
      <feGaussianBlur stdDeviation="2.2"/>
    </filter>
  </defs>

  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Planning mockup boundary: reproduced/controlled evidence only, not original transcript evidence -->
  <text x="48" y="54" fill="#7C8BA6" font-family="Inter, Arial, sans-serif" font-size="22" font-weight="700" letter-spacing="2">VIDTOOLZ PLANNING MOCKUP</text>

  <!-- Main hook text -->
  <text x="54" y="146" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="900" letter-spacing="-2">WHERE'S</text>
  <text x="54" y="225" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="900" letter-spacing="-2">THE PROOF?</text>
  <rect x="54" y="248" width="420" height="8" fill="#F5B84B" rx="4"/>

  <!-- Left weak idea card -->
  <g filter="url(#shadow)">
    <rect x="68" y="315" width="405" height="270" rx="26" fill="url(#leftPanel)" stroke="#4B5568" stroke-width="2"/>
    <rect x="96" y="344" width="182" height="36" rx="18" fill="#40242B" stroke="#F87171" stroke-width="2"/>
    <text x="116" y="369" fill="#FCA5A5" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">PREPARED</text>
    <rect x="288" y="344" width="156" height="36" rx="18" fill="#3A2E18" stroke="#F5B84B" stroke-width="2"/>
    <text x="307" y="369" fill="#FCD88B" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">STRESS TEST</text>

    <text x="98" y="424" fill="#D7DEE9" font-family="Inter, Arial, sans-serif" font-size="28" font-weight="800">AI VIDEO IDEA</text>
    <text x="98" y="472" fill="#AEB8C8" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" filter="url(#softBlur)">10 AI Tools Every</text>
    <text x="98" y="508" fill="#AEB8C8" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" filter="url(#softBlur)">Creator Should Try</text>
    <text x="98" y="544" fill="#AEB8C8" font-family="Inter, Arial, sans-serif" font-size="25" font-weight="700" filter="url(#softBlur)">in 2026</text>
  </g>

  <!-- Arrow / tension -->
  <path d="M514 452 C560 420 590 420 632 452" fill="none" stroke="#F5B84B" stroke-width="8" stroke-linecap="round"/>
  <path d="M632 452 L602 430 M632 452 L602 474" fill="none" stroke="#F5B84B" stroke-width="8" stroke-linecap="round"/>

  <!-- Right proof plan panel -->
  <g filter="url(#shadow)">
    <rect x="680" y="112" width="540" height="500" rx="32" fill="url(#rightPanel)" stroke="#51627D" stroke-width="2"/>
    <rect x="724" y="150" width="188" height="42" rx="21" fill="#23324D" stroke="#8DB7FF" stroke-width="2"/>
    <text x="747" y="178" fill="#BBD3FF" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="900">UNDER REVIEW</text>

    <text x="724" y="244" fill="#FFFFFF" font-family="Inter, Arial, sans-serif" font-size="48" font-weight="900" letter-spacing="-1">PROOF PLAN</text>
    <text x="724" y="284" fill="#9EAABD" font-family="Inter, Arial, sans-serif" font-size="24" font-weight="600">Test before production</text>

    <g font-family="Inter, Arial, sans-serif" font-size="25" font-weight="800">
      <rect x="724" y="324" width="448" height="58" rx="16" fill="#101B2A" stroke="#34445E" stroke-width="2"/>
      <text x="750" y="361" fill="#DCE7F7">Viewer promise</text>
      <text x="1062" y="361" fill="#F5B84B">?</text>

      <rect x="724" y="398" width="448" height="58" rx="16" fill="#101B2A" stroke="#34445E" stroke-width="2"/>
      <text x="750" y="435" fill="#DCE7F7">Proof moment</text>
      <text x="1062" y="435" fill="#F5B84B">?</text>

      <rect x="724" y="472" width="448" height="58" rx="16" fill="#101B2A" stroke="#34445E" stroke-width="2"/>
      <text x="750" y="509" fill="#DCE7F7">Visual evidence</text>
      <text x="1062" y="509" fill="#F5B84B">?</text>
    </g>

    <rect x="724" y="556" width="232" height="40" rx="20" fill="#312812" stroke="#F5B84B" stroke-width="2"/>
    <text x="748" y="582" fill="#FCD88B" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="900">TEST FIRST</text>
  </g>

  <!-- Footer guardrail -->
  <text x="54" y="670" fill="#7C8BA6" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="700">Planning mockup only · not final thumbnail · not shooting approval</text>
</svg>
