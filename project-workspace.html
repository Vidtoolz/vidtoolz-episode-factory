<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Project — VIDTOOLZ</title>
    <link rel="stylesheet" href="styles.css?v=1.9.6">
    <style>
      .pw { max-width: 920px; margin: 0 auto; padding: 24px 20px 48px; }
      .pw-back { font-size:12px; }
      .pw-id { display:flex; gap:14px; align-items:baseline; flex-wrap:wrap; margin:8px 0 4px; }
      .pw-id h1 { margin:0; font-size:24px; }
      .pill{font-size:11px;padding:2px 9px;border-radius:100px;white-space:nowrap;}
      .st-active{background:rgba(88,166,255,.18);color:#58a6ff;}.st-parked{background:rgba(139,148,158,.18);color:#8b949e;}
      .st-blocked{background:rgba(248,81,73,.15);color:#f85149;}.st-published,.st-editing{background:rgba(63,185,80,.18);color:#3fb950;}
      .meta{color:var(--muted,#8b949e);font-size:12px;}
      .card{background:var(--panel,#161b22);border:1px solid var(--border,#30363d);border-radius:10px;padding:18px 20px;margin:16px 0;}
      .card.next{border-color:var(--accent,#3fb950);box-shadow:0 0 0 1px rgba(63,185,80,.25);}
      .next-label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:#3fb950;font-weight:600;}
      .stagebar{height:6px;background:var(--panel-3,#21262d);border-radius:3px;overflow:hidden;margin:10px 0;}
      .stagefill{height:100%;background:linear-gradient(90deg,#2ea043,#3fb950);}
      .btn{border:none;border-radius:6px;padding:8px 16px;font-size:13px;cursor:pointer;text-decoration:none;display:inline-block;margin-right:8px;}
      .btn-go{background:#2ea043;color:#fff;} .btn-alt{background:var(--panel-3,#21262d);color:inherit;border:1px solid var(--border,#30363d);}
      .btn-dry{background:transparent;color:#58a6ff;border:1px solid rgba(88,166,255,.4);}
      .counts{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;}
      .count{background:var(--panel-3,#21262d);border-radius:6px;padding:8px 10px;font-size:12px;}
      .count b{display:block;font-size:18px;}
      details{margin:10px 0;} summary{cursor:pointer;color:var(--muted,#8b949e);font-size:13px;}
      .warn{color:#d29922;font-size:12px;margin:4px 0;} .blk{color:#f85149;}
      .result{font-size:12px;white-space:pre-wrap;background:var(--panel-3,#21262d);border-radius:6px;padding:10px;margin-top:10px;display:none;}
      .focus-link{float:right;}
    </style>
  </head>
  <body>
    <nav class="ef-nav"><span class="ef-nav-brand">EF</span><a href="projects.html">Projects</a><a href="daily-idea-scout.html">Ideas</a><a href="production-pipeline.html">Pipeline</a></nav>
    <div class="pw">
      <div class="pw-back"><a href="projects.html">← Back to projects</a> · <a href="daily-idea-scout.html">Ideas</a></div>
      <div id="pw-body"><p class="meta">Loading project…</p></div>
    </div>
    <script src="project-client.js"></script>
    <script>
      const ID = new URLSearchParams(location.search).get('id') || '';
      const body = document.getElementById('pw-body');
      const client = ProjectClient();

      function load(){
        if(!ID){ body.innerHTML='<p class="blk">No project id. <a href="projects.html">Back to projects</a></p>'; return; }
        client.fetchState(ID).then(render).catch(e=>{ body.innerHTML = `<p class="blk">Could not load project: ${client.esc(e.message||e)}</p>`; });
      }

      function render(d){
        const s=d.state, nt=d.next_task, c=s.counts||{};
        const pct = s.stage_total ? Math.round(((s.stage_index+1)/s.stage_total)*100):0;
        body.innerHTML = `
          <a class="btn btn-alt focus-link" href="project-focus.html?id=${encodeURIComponent(ID)}">Focus mode →</a>
          <a class="btn btn-alt focus-link" href="project-media-kit.html?id=${encodeURIComponent(ID)}" style="margin-right:8px;">Media kit →</a>
          <div class="pw-id"><h1>${client.esc(s.title)}</h1><span class="pill st-${client.esc(s.status)}">${client.esc(s.status)}</span></div>
          <div class="meta">Package <code>${client.esc(s.project_id)}</code></div>
          <div class="stagebar"><div class="stagefill" style="width:${pct}%"></div></div>
          <div class="meta">Stage <b>${client.esc(s.stage)}</b> · ${s.stage_index+1} of ${s.stage_total}</div>

          ${provenanceCard(s.provenance)}

          <div class="card next">
            <div class="next-label">Next task</div>
            <h2 style="margin:6px 0;">${client.esc(nt.label)}</h2>
            <p class="meta" style="font-size:13px;">${client.esc(nt.why)}</p>
            <div id="pw-action"></div>
            <div class="result" id="pw-result"></div>
          </div>

          ${(s.blockers&&s.blockers.length)?`<div class="card"><b class="blk">Blockers</b>${s.blockers.map(b=>`<div class="warn blk">⛔ ${client.esc(b)}</div>`).join('')}</div>`:''}
          ${(s.warnings&&s.warnings.length)?`<div class="card"><b>Warnings</b>${s.warnings.map(w=>`<div class="warn">⚠ ${client.esc(w)}</div>`).join('')}</div>`:''}

          <div class="card">
            <div class="next-label">Project evidence</div>
            <div class="counts" style="margin-top:8px;">
              ${countCard('Image prompts',c.image_prompts)}
              ${countCard('Local images',c.local_images)}
              ${countCard('External images',c.manual_external_images)}
              ${countCard('Selected',c.selected_images)}
              ${countCard('I2V prompts',c.i2v_prompts)}
              ${countCard('Local videos',c.local_videos)}
              ${countCard('External videos',c.manual_external_videos)}
              ${s.has_resolve_handoff
                ? `<a class="count" style="text-decoration:none;color:inherit;border:1px solid rgba(63,185,80,.4);" href="project-resolve-handoff.html?id=${encodeURIComponent(ID)}"><b>✓</b>Resolve handoff →</a>`
                : countCard('Resolve handoff','—')}
            </div>
          </div>

          <details><summary>Media (${(d.media.images||[]).length} image, ${(d.media.videos||[]).length} video)</summary>
            <div class="meta" style="margin-top:8px;">${mediaList(d.media)}</div></details>
          <details><summary>Routing &amp; service note</summary>
            <div class="meta" style="margin-top:8px;">Prompts/images → local vidnux · I2V/videos → local PRESTO · external GPT/KlingAI → manual import. If a local service is down the task is blocked, never silently rerouted.</div></details>
        `;
        client.renderAction(document.getElementById('pw-action'), nt, ()=>load(), document.getElementById('pw-result'));
      }
      function provenanceCard(p){
        if(!p || (p.source !== 'daily_idea_scout' && p.source !== 'user_topic_scout')) return '';
        const isTopic = p.source === 'user_topic_scout';
        const heading = isTopic ? 'Promoted from user topic' : 'Promoted from idea';
        const rows = [
          ['Source', isTopic ? 'User-seeded topic scout' : 'Daily Idea Scout'],
          isTopic && p.seed_topic ? ['Seed topic', p.seed_topic] : null,
          p.idea_date ? ['Idea date', p.idea_date] : null,
          (p.idea_index!==null && p.idea_index!==undefined) ? ['Idea index', String(p.idea_index)] : null,
          p.premise ? ['Premise', p.premise] : null,
          (p.score!==null && p.score!==undefined) ? ['Score', String(p.score)] : null,
        ].filter(Boolean);
        return `<div class="card"><div class="next-label">${client.esc(heading)}</div>
          <div style="margin-top:8px;font-size:13px;">${rows.map(r=>`<div class="meta"><b style="color:var(--soft,#c9d1d9);">${client.esc(r[0])}:</b> ${client.esc(r[1])}</div>`).join('')}</div>
          ${scoreExplanation(p)}</div>`;
      }
      function scoreExplanation(p){
        const sx = p.score_explanation;
        const scoreLabel = (p.score!==null && p.score!==undefined) ? (p.score + '/10') : '';
        if(!sx || !sx.available){
          return `<details style="margin-top:10px;"><summary class="meta">Why this scored ${client.esc(scoreLabel||'—')}</summary>
            <div class="meta" style="margin-top:6px;">No detailed scoring breakdown was stored for this idea.${p.premise?' Premise: '+client.esc(p.premise):''}</div></details>`;
        }
        const list = (arr)=>(arr&&arr.length)?('<ul style="margin:4px 0 8px;padding-left:18px;">'+arr.map(x=>`<li class="meta">${client.esc(x)}</li>`).join('')+'</ul>'):'';
        const crit = (sx.criteria&&sx.criteria.length)
          ? '<div class="meta" style="margin-top:4px;"><b style="color:var(--soft,#c9d1d9);">Criteria</b></div>'+
            sx.criteria.map(c=>`<div class="meta">• ${client.esc(c.name)}${(c.score!==undefined&&c.score!==null)?' ('+client.esc(c.score)+')':''}${c.result?': '+client.esc(c.result):''}</div>`).join('')
          : '';
        return `<details style="margin-top:10px;" open><summary class="meta" style="color:#3fb950;">Why this scored ${client.esc(scoreLabel)}</summary>
          <div style="margin-top:6px;font-size:13px;">
            ${sx.summary?`<div class="meta" style="margin-bottom:6px;">${client.esc(sx.summary)}</div>`:''}
            ${sx.succeeded&&sx.succeeded.length?'<div class="meta"><b style="color:var(--soft,#c9d1d9);">What succeeded</b></div>'+list(sx.succeeded):''}
            ${sx.weaker_points&&sx.weaker_points.length?'<div class="meta"><b style="color:#d29922;">Weaker / watch</b></div>'+list(sx.weaker_points):''}
            ${crit}
            ${sx.raw_rationale?`<details style="margin-top:6px;"><summary class="meta">Raw rationale</summary><div class="meta" style="margin-top:4px;white-space:pre-wrap;">${client.esc(sx.raw_rationale)}</div></details>`:''}
          </div></details>`;
      }
      function countCard(label,val){ return `<div class="count"><b>${client.esc(val)}</b>${client.esc(label)}</div>`; }
      function mediaList(m){
        const all=(m.images||[]).concat(m.videos||[]);
        if(!all.length) return 'No media yet.';
        return all.slice(0,40).map(x=>`${x.media_type==='video'?'🎬':'🖼'} ${client.esc(x.path)} <span style="color:#58a6ff;">[${client.esc(x.variant)}]</span>`).join('<br>');
      }
      load();
    </script>
  </body>
</html>
