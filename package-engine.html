<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VIDTOOLZ Package Engine</title>
    <link rel="stylesheet" href="styles.css?v=1.7.4-thumb2" />
  </head>
  <body>
    <div class="app-shell package-engine-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">VIDTOOLZ</p>
          <h1>Package Engine <span class="version-badge">v1.7.4</span></h1>
        </div>
        <div class="topbar-actions">
          <a class="nav-link-button" href="index.html">Episode Factory</a>
          <a class="nav-link-button" href="package-runs-dashboard.html">Run Dashboard</a>
          <a class="nav-link-button" href="mission-control.html">Mission Control</a>
          <a class="nav-link-button" href="production-day-dashboard.html">Production Day</a>
          <div class="dashboard-mode-toggle package-engine-view-toggle" aria-label="Package Engine view mode">
            <button type="button" class="active" data-package-engine-view-mode-button="focused" aria-pressed="true">Focused View</button>
            <button type="button" data-package-engine-view-mode-button="full" aria-pressed="false">Full Dashboard</button>
          </div>
          <button id="downloadJsonBtn" class="primary-btn" type="button" disabled data-view-group="exports" data-view-default="full">Download selected JSON</button>
          <button id="downloadMarkdownBtn" type="button" disabled data-view-group="exports" data-view-default="full">Download selected Markdown</button>
          <button id="generateThumbnailsBtn" type="button" class="secondary-btn" data-view-group="thumbnail-work" data-view-default="full">Generate thumbnail candidates</button>
        </div>
      </header>

      <p id="packageStatus" class="global-status" role="status" data-view-group="diagnostics" data-view-default="focused"></p>

      <main class="package-engine-workspace" data-view-mode="focused">
        <section id="packageFocusPanel" class="package-focus-panel" aria-label="Package Focus" data-view-group="creator-focus" data-view-default="focused"></section>

        <section class="package-controls" aria-label="Package controls" data-view-group="candidate-review" data-view-default="focused">
          <div>
            <h2>Candidate Review</h2>
            <p class="muted">Review 10 structured package candidates, select one winner, then export it.</p>
          </div>
          <label data-view-group="metadata" data-view-default="full">
            <span>Sort</span>
            <select id="sortSelect">
              <option value="score-desc">Score high to low</option>
              <option value="score-asc">Score low to high</option>
              <option value="number">Package number</option>
            </select>
          </label>
          <label data-view-group="metadata" data-view-default="full">
            <span>Recommendation</span>
            <select id="recommendationFilter">
              <option value="All">All</option>
              <option value="Make">Make</option>
              <option value="Maybe">Maybe</option>
              <option value="Reject">Reject</option>
            </select>
          </label>
          <div class="package-summary">
            <span id="candidateCount">0 candidates</span>
            <strong id="selectedSummary">No winner selected</strong>
          </div>
        </section>

        <section id="generatedThumbnailPanel" class="generated-thumbnail-panel hidden" aria-live="polite" data-view-group="thumbnail-work" data-view-default="full"></section>

        <section id="packageGrid" class="package-grid" aria-label="Package candidate cards" data-view-group="candidate-review" data-view-default="focused"></section>
      </main>
    </div>

    <script src="package-engine-run.js?v=1.7.4"></script>
    <script src="package-engine-model.js?v=1.7.4"></script>
    <script src="package-engine.js?v=1.7.6"></script>
  </body>
</html>
